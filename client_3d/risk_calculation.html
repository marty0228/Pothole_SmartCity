<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>세종대 스마트시티 - 3D 실사 관제 시스템</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background-color: #dab49d; font-family: 'Segoe UI', Tahoma, sans-serif; }
        
        /* 로딩 및 알림 UI */
        #loading {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            color: #fff; background: rgba(0,0,0,0.85); padding: 25px 45px; 
            border-radius: 8px; font-size: 18px; font-weight: bold; z-index: 20;
            border: 2px solid #ffaa00; text-align: center; box-shadow: 0 0 20px rgba(255,170,0,0.4);
        }
        #api-alert {
            position: absolute; top: 20px; right: 20px; background: rgba(255, 50, 50, 0.9);
            color: white; padding: 12px 24px; border-radius: 6px; font-weight: bold; display: none; z-index: 10;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5); border: 1px solid #ffaaaa;
        }

        /* 좌측 하단 조작 패널 */
        #ui-panel {
            position: absolute; bottom: 30px; left: 30px; color: #eee;
            background: rgba(15, 15, 15, 0.9); padding: 20px; border-radius: 12px; z-index: 10;
            box-shadow: 0 4px 15px rgba(0,0,0,0.7); border-left: 4px solid #00ffcc;
        }
        .key-btn { 
            display: inline-block; background: #333; padding: 6px 12px; 
            border-radius: 6px; margin: 4px; font-weight: bold; border: 1px solid #555; color: #fff;
        }

        /* AI 타겟팅 조준점 */
        #reticle {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 80px; height: 80px; z-index: 10; pointer-events: none;
        }
        .reticle-corner { position: absolute; width: 20px; height: 20px; border: 3px solid #00ffcc; }
        .tl { top: 0; left: 0; border-right: none; border-bottom: none; }
        .tr { top: 0; right: 0; border-left: none; border-bottom: none; }
        .bl { bottom: 0; left: 0; border-right: none; border-top: none; }
        .br { bottom: 0; right: 0; border-left: none; border-top: none; }
        .dot { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 8px; height: 8px; background-color: red; border-radius: 50%; box-shadow: 0 0 10px red;
        }

        /* 킥보드 핸들 UI */
        #scooter-handle {
            position: absolute; bottom: -20px; left: 50%; transform: translateX(-50%);
            width: 350px; height: 160px; z-index: 5; pointer-events: none;
            background: 
                linear-gradient(to bottom, #111 25%, transparent 25%),
                linear-gradient(to right, transparent 46%, #222 46%, #222 54%, transparent 54%);
            background-size: 100% 20px, 100% 100%; background-repeat: no-repeat;
            filter: drop-shadow(0 -5px 10px rgba(0,0,0,0.5));
        }
    </style>
</head>
<body>

    <div id="loading">📡 세종대학교 디지털 트윈 렌더링 중...<br><span style="font-size:14px; color:#aaa; margin-top:10px; display:block;">고해상도 에셋을 생성하고 있습니다.</span></div>
    <div id="api-alert">⚠️ 전방 파손(포트홀/크랙) 객체 수신!</div>
    
    <div id="ui-panel">
        <h3 style="margin: 0 0 15px 0; color: #00ffcc; font-size: 16px;">관제 시뮬레이션 모드</h3>
        <p style="margin: 5px 0; font-size: 14px;"><span class="key-btn">W</span> 전진 가속</p>
        <p style="margin: 5px 0; font-size: 14px;"><span class="key-btn">A</span> <span class="key-btn">D</span> 방향 조향</p>
        <p style="margin: 5px 0; font-size: 14px;"><span class="key-btn">S</span> 브레이크</p>
    </div>
    
    <div id="reticle">
        <div class="reticle-corner tl"></div><div class="reticle-corner tr"></div>
        <div class="reticle-corner bl"></div><div class="reticle-corner br"></div><div class="dot"></div>
    </div>
    <div id="scooter-handle"></div>

    <script>
        // ==========================================
        // 1. 씬, 카메라, 조명 (골든 아워)
        // ==========================================
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xdab49d);
        scene.fog = new THREE.FogExp2(0xdab49d, 0.002);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 2000);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        document.body.appendChild(renderer.domElement);

        const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
        scene.add(ambientLight);
        
        const dirLight = new THREE.DirectionalLight(0xffb055, 1.5);
        dirLight.position.set(300, 200, -300);
        dirLight.castShadow = true;
        dirLight.shadow.mapSize.width = 2048;
        dirLight.shadow.mapSize.height = 2048;
        dirLight.shadow.camera.left = -500; dirLight.shadow.camera.right = 500;
        dirLight.shadow.camera.top = 500; dirLight.shadow.camera.bottom = -500;
        scene.add(dirLight);

        // ==========================================
        // 2. 아스팔트 및 배경 바닥 텍스처
        // ==========================================
        function createAsphaltTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 512; canvas.height = 512;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#2b2b2b'; ctx.fillRect(0, 0, 512, 512);
            for (let i = 0; i < 150000; i++) {
                ctx.fillStyle = Math.random() > 0.5 ? '#1a1a1a' : '#3c3c3c';
                ctx.fillRect(Math.random() * 512, Math.random() * 512, 1.2, 1.2);
            }
            const texture = new THREE.CanvasTexture(canvas);
            texture.wrapS = THREE.RepeatWrapping; texture.wrapT = THREE.RepeatWrapping;
            return texture;
        }

        const roadMat = new THREE.MeshStandardMaterial({ 
            map: createAsphaltTexture(), color: 0x777777, roughness: 1.0 
        });

        const baseGround = new THREE.Mesh(
            new THREE.PlaneGeometry(5000, 5000), 
            new THREE.MeshStandardMaterial({ color: 0x3d4a36, roughness: 1 })
        );
        baseGround.rotation.x = -Math.PI / 2; baseGround.receiveShadow = true; 
        scene.add(baseGround);

        const centerLat = 37.5502; const centerLng = 127.0731;
        function latLngToXZ(lat, lng) {
            const x = (lng - centerLng) * 88000;
            const z = -(lat - centerLat) * 111000; 
            return new THREE.Vector3(x, 0, z);
        }
      


        // 바뀐 부분 1 =================================================================== 
        // 위험도 계산 함수

        function calculatePotholeRisk({
            width,
            length,
            depth,
            distance,
            speed
        }) {

            // 면적
            const area = width * length;

            // 크기 점수
            const sizeScore = area * 8;

            // 깊이 점수
            const depthScore = depth * 120;

            // 거리 점수
            let distanceScore = 0;

            if (distance < 5) {
                distanceScore = 40;
            }
            else if (distance < 10) {
                distanceScore = 30;
            }
            else if (distance < 20) {
                distanceScore = 15;
            }
            else  {
                distanceScore = 5;
            }    

            // 속도 점수
            const speedScore = speed * 35;

            // 총 위험도
            let total =
                sizeScore +
                depthScore +
                distanceScore +
                speedScore;

            total = Math.min(100, total);

            let level = "LOW";

            if (total >= 70) {
                level = "HIGH";
            }
            else if (total >= 40) {
                level = "MEDIUM";
            }

            return {
                score: total.toFixed(1),
                level
            };
        }
      
        // ==========================================
        // ⭐ 3. 완벽한 3D 포트홀 + 크랙 생성기
        // ==========================================
        function createComplexHazard(size = 3.0) {
            const group = new THREE.Group();

            // A. 투명 캔버스에 [중앙 파임 + 주변 균열] 그리기
            const canvas = document.createElement('canvas');
            canvas.width = 512; canvas.height = 512;
            const ctx = canvas.getContext('2d');

            // 중앙 구덩이 (어둡고 불규칙함)
            ctx.fillStyle = '#080808';
            ctx.beginPath();
            for (let i = 0; i < 16; i++) {
                const angle = (i / 16) * Math.PI * 2;
                const r = 90 + Math.random() * 40; // 찌그러진 정도
                const x = 256 + r * Math.cos(angle);
                const y = 256 + r * Math.sin(angle);
                if (i === 0) ctx.moveTo(x, y);
                else ctx.lineTo(x, y);
            }
            ctx.closePath();
            ctx.fill();

            // 바깥으로 뻗어가는 균열(Crack) - 재귀 함수
            ctx.strokeStyle = '#080808';
            ctx.lineCap = 'round'; ctx.lineJoin = 'round';
            function drawCrack(x, y, angle, depth, length) {
                if (depth === 0) return;
                ctx.lineWidth = depth * 2.5;
                ctx.beginPath(); ctx.moveTo(x, y);
                const nx = x + Math.cos(angle) * length;
                const ny = y + Math.sin(angle) * length;
                ctx.lineTo(nx, ny); ctx.stroke();
                // 두 갈래로 뻗어나감
                drawCrack(nx, ny, angle - 0.4 + Math.random()*0.3, depth - 1, length * 0.7);
                drawCrack(nx, ny, angle + 0.4 - Math.random()*0.3, depth - 1, length * 0.7);
            }
            for(let i=0; i<6; i++) {
                drawCrack(256, 256, (i/6)*Math.PI*2 + Math.random(), 4, 70);
            }

            // B. 그린 캔버스를 도로 위 스티커(Plane)로 부착
            const hazardTex = new THREE.CanvasTexture(canvas);
            const hazardMat = new THREE.MeshStandardMaterial({ 
                map: hazardTex, transparent: true, roughness: 1.0, 
                polygonOffset: true, polygonOffsetFactor: -1 // Z-fighting 방지
            });
            const decal = new THREE.Mesh(new THREE.PlaneGeometry(size, size), hazardMat);
            decal.rotation.x = -Math.PI / 2;
            decal.position.y = 0.12; // 도로보다 미세하게 위
            group.add(decal);

            // C. 중앙에 입체적인 파편(Debris) 흩뿌려 깊이감 착시 유도
            const rockMat = new THREE.MeshStandardMaterial({ color: 0x2a2a2a, roughness: 0.9 });
            for(let i=0; i<15; i++) {
                const rockSize = size * (0.02 + Math.random() * 0.03);
                const rock = new THREE.Mesh(new THREE.DodecahedronGeometry(rockSize), rockMat);
                
                // 구덩이 반경 내에 흩뿌리기
                const radius = Math.random() * (size * 0.25);
                const theta = Math.random() * Math.PI * 2;
                rock.position.set(radius * Math.cos(theta), 0.12 + rockSize/2, radius * Math.sin(theta));
                rock.rotation.set(Math.random(), Math.random(), Math.random());
                rock.castShadow = true; 
                group.add(rock);
            }

            return group;
        }

        // ==========================================
        // 4. 세종대 실제 도로망 및 데이터 연동
        // ==========================================
        async function fetchRoadData() {
            const bbox = "37.545,127.065,37.555,127.080";
            const query = `[out:json];(way["highway"](${bbox}););out geom;`;
            const url = `https://overpass-api.de/api/interpreter?data=${encodeURIComponent(query)}`;

            try {
                const response = await fetch(url);
                const data = await response.json();

                // 도로 생성
                data.elements.forEach(element => {
                    if (element.geometry && element.geometry.length > 1) {
                        for(let i=0; i < element.geometry.length - 1; i++) {
                            const p1 = latLngToXZ(element.geometry[i].lat, element.geometry[i].lon);
                            const p2 = latLngToXZ(element.geometry[i+1].lat, element.geometry[i+1].lon);
                            const dist = p1.distanceTo(p2); if(dist < 1) continue;
                            
                            const roadWidth = 9;
                            const roadGeo = new THREE.PlaneGeometry(roadWidth, dist);
                            const uvs = roadGeo.attributes.uv.array;
                            for ( let j = 0; j < uvs.length; j += 2 ) {
                                uvs[ j ] *= 1; uvs[ j + 1 ] *= (dist / roadWidth); 
                            }
                            
                            const road = new THREE.Mesh(roadGeo, roadMat);
                            const mid = p1.clone().lerp(p2, 0.5);
                            road.position.set(mid.x, 0.1, mid.z);
                            road.lookAt(p2.x, 0.1, p2.z); road.rotateX(-Math.PI / 2);
                            road.receiveShadow = true; scene.add(road);
                        }
                    }
                });

                // 더미 건물 생성
                const buildingMat = new THREE.MeshStandardMaterial({ color: 0x888888, roughness: 0.8 });
                for(let i=0; i<120; i++) {
                    const x = (Math.random() - 0.5) * 1000; const z = (Math.random() - 0.5) * 1000;
                    if(Math.abs(x) < 25 && Math.abs(z) < 25) continue; 
                    const w = Math.random() * 20 + 15; const h = Math.random() * 40 + 15;
                    const b = new THREE.Mesh(new THREE.BoxGeometry(w, h, w), buildingMat);
                    b.position.set(x, h/2, z);
                    b.castShadow = true; b.receiveShadow = true; scene.add(b);
                }

                document.getElementById('loading').style.display = 'none';
              

                // ==========================================
                // ⭐ AI팀 감지 데이터 연동 시뮬레이션
                // ==========================================

              
              // 바뀐 부분 2 ===================================================================
              // 포트홀 데이터에 실제 크기 추가
            
                const mockAiData = [
                    {
                        lat: 37.55030,
                        lng: 127.07310,

                        width: 1.8,
                        length: 2.0,
                        depth: 0.28,

                        size: 3.5
                    },

                    {
                        lat: 37.55010,
                        lng: 127.07305,

                        width: 0.8,
                        length: 1.1,
                        depth: 0.12,

                        size: 2.0
                    }
                ];

              
              // 바뀐 부분 3 ===================================================================
              // 위험도 계산 연결

                mockAiData.forEach(data => {

                    const pos = latLngToXZ(data.lat, data.lng);

                    const hazard = createComplexHazard(data.size);

                    hazard.position.set(pos.x, 0, pos.z);

                    scene.add(hazard);

                    // ==================================
                    // 사용자와 거리 계산
                    // ==================================
                    const distance = camera.position.distanceTo(pos);

                    // ==================================
                    // 위험도 계산
                    // ==================================
                    const risk = calculatePotholeRisk({
                        width: data.width,
                        length: data.length,
                        depth: data.depth,
                        distance: distance,
                        speed: speed
                    });

                    console.log(`
                        포트홀 위험도 분석
                        --------------------
                        위치: ${data.lat}, ${data.lng}
                        위험 점수: ${risk.score}
                        위험 등급: ${risk.level}
                    `);

                    // HIGH 위험이면 빨간색 경고
                    if (risk.level === "HIGH") {

                        const alertBox = document.getElementById('api-alert');

                        alertBox.innerHTML =
                            `🚨 HIGH 위험 포트홀 감지<br>
                             위험도: ${risk.score}`;

                        alertBox.style.background = "rgba(255,0,0,0.9)";
                        alertBox.style.display = 'block';
                    }
                });
              

                // 알림창 띄우기
                const alertBox = document.getElementById('api-alert');
                alertBox.style.display = 'block';
                setTimeout(() => alertBox.style.display = 'none', 4000);

            } catch (error) { document.getElementById('loading').innerText = "데이터 로딩 실패"; }
        }
        fetchRoadData();

        // ==========================================
        // 5. 킥보드 주행 물리엔진 (Lerp 관성)
        // ==========================================
        camera.position.set(0, 1.8, 0); 
        const targetPos = new THREE.Vector3(0, 1.8, 0);
        let speed = 0; const maxSpeed = 0.9; const acceleration = 0.02; const friction = 0.95;
        const keys = { w: false, a: false, s: false, d: false };

        window.addEventListener('keydown', (e) => { keys[e.key.toLowerCase()] = true; });
        window.addEventListener('keyup', (e) => { keys[e.key.toLowerCase()] = false; });

        function animate() {
            requestAnimationFrame(animate);
            if (keys.w) speed = Math.min(speed + acceleration, maxSpeed);
            else if (keys.s) speed = Math.max(speed - acceleration, -maxSpeed);
            else speed *= friction;

            if (keys.a) camera.rotation.y += 0.025;
            if (keys.d) camera.rotation.y -= 0.025;

            const dir = new THREE.Vector3();
            camera.getWorldDirection(dir); dir.y = 0; dir.normalize();
            targetPos.addScaledVector(dir, speed);
            camera.position.lerp(targetPos, 0.15); 
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
