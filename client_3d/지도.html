<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SEJONG SMART CITY DIGITAL TWIN MAP</title>

<script src="https://cesium.com/downloads/cesiumjs/releases/1.104/Build/Cesium/Cesium.js"></script>
<link href="https://cesium.com/downloads/cesiumjs/releases/1.104/Build/Cesium/Widgets/widgets.css" rel="stylesheet">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,
body{
    width:100%;
    height:100%;
    overflow:hidden;
    font-family:'Pretendard',sans-serif;
    background:#050816;
    color:white;
}

body::before{
    content:'';
    position:fixed;
    inset:0;
    background:
        radial-gradient(circle at top left,#1e3a8a 0%,transparent 30%),
        radial-gradient(circle at bottom right,#0ea5e9 0%,transparent 25%),
        linear-gradient(135deg,#020617,#08111f,#050816);
    z-index:-2;
}

body::after{
    content:'';
    position:fixed;
    inset:0;
    background-image:
        linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
    background-size:40px 40px;
    z-index:-1;
}

.digital-twin-page{
    width:100%;
    height:100vh;
    padding:30px;
}

.cesium-layout{
    width:100%;
    height:100%;
    display:flex;
    gap:24px;
}

.left-panel{
    width:320px;
    flex-shrink:0;
    background:rgba(255,255,255,0.05);
    border-radius:28px;
    border:1px solid rgba(255,255,255,0.08);
    backdrop-filter:blur(18px);
    padding:28px;
    box-shadow:0 20px 50px rgba(0,0,0,0.45);
}

.left-panel h1{
    font-size:28px;
    line-height:1.25;
    font-weight:800;
}

.left-panel .description{
    margin-top:18px;
    color:#9fb2bf;
    line-height:1.8;
}

.status-box{
    margin-top:25px;
    padding:22px;
    border-radius:20px;
    background:rgba(255,255,255,0.04);
    border:1px solid rgba(255,255,255,0.06);
}

.status-box h3{
    color:#94a3b8;
    font-size:14px;
    margin-bottom:14px;
}

.status-number{
    font-size:52px;
    color:#ff5b5b;
    font-weight:800;
}

.status-box p{
    margin-top:10px;
    color:#9fb2bf;
    line-height:1.7;
}

.map-wrapper{
    flex:1;
    border-radius:28px;
    overflow:hidden;
    position:relative;
    border:1px solid rgba(255,255,255,0.08);
    box-shadow:0 25px 60px rgba(0,0,0,0.55);
}

#cesiumContainer{
    width:100%;
    height:100%;
}

.info-panel{
    position:absolute;
    right:24px;
    top:24px;
    width:320px;
    padding:24px;
    border-radius:22px;
    background:rgba(10,15,25,0.85);
    backdrop-filter:blur(16px);
    border:1px solid rgba(255,255,255,0.08);
    z-index:10;
}

.info-panel h3{
    color:#ff6b6b;
    margin-bottom:18px;
}

.info-panel p{
    line-height:1.8;
    color:#dbe7ff;
}

.analyze-btn{
    width:100%;
    margin-top:18px;
    padding:15px;
    border:none;
    border-radius:16px;
    background:linear-gradient(135deg,#ff5b5b,#ff7b7b);
    color:white;
    font-weight:700;
    cursor:pointer;
}

@media(max-width:1200px){
    .digital-twin-page{
        padding:18px;
    }

    .left-panel{
        display:none;
    }

    .info-panel{
        width:min(320px, calc(100% - 32px));
        right:16px;
        top:16px;
    }
}
</style>
</head>

<body>
<div class="digital-twin-page">
    <div class="cesium-layout">
        <aside class="left-panel">
            <h1>SMART CITY<br>CONTROL</h1>

            <p class="description">
                AI 포트홀 탐지와 실시간 디지털 트윈
                도로 모니터링 시스템
            </p>

            <div class="status-box">
                <h3>실시간 감지 현황</h3>

                <div class="status-number">
                    <span id="cesiumDetectedCount">0</span>
                </div>

                <p>
                    AI 감지 도로 파손 위치<br>
                    포트홀 <span id="cesiumPotholeCount">0</span> · 크랙 <span id="cesiumCrackCount">0</span>
                </p>
            </div>
        </aside>

        <main class="map-wrapper">
            <div id="cesiumContainer"></div>

            <div class="info-panel">
                <h3>⚠ 위험 도로 파손 감지</h3>

                <p>
                    세종대학교 인근 도로에서
                    깊이 15cm 이상의 위험 포트홀이
                    감지되었습니다.
                </p>

                <button class="analyze-btn">정밀 분석 활성화</button>
            </div>
        </main>
    </div>
</div>

<script>
const viewer = new Cesium.Viewer('cesiumContainer',{
    imageryProvider:new Cesium.OpenStreetMapImageryProvider({
        url:'https://a.tile.openstreetmap.org/'
    }),
    baseLayerPicker:false,
    geocoder:false,
    timeline:false,
    animation:false,
    infoBox:false,
    selectionIndicator:false
});

viewer.camera.flyTo({
    destination:Cesium.Cartesian3.fromDegrees(
        127.0738,
        37.5506,
        1800
    ),
    duration:2
});

fetch('./result.json')
.then(response => {
    if(!response.ok){
        throw new Error('result.json 파일을 불러오지 못했습니다.');
    }
    return response.json();
})
.then(data => {
    let potholeCount = 0;
    let crackCount = 0;

    data.forEach(item => {
        if(item.type === 'pothole'){
            potholeCount++;
        }
        else if(item.type === 'crack'){
            crackCount++;
        }

        viewer.entities.add({
            position:Cesium.Cartesian3.fromDegrees(
                item.lng,
                item.lat
            ),

            point:{
                pixelSize:14,
                color:item.type === 'pothole'
                    ? Cesium.Color.RED
                    : Cesium.Color.ORANGE,
                outlineColor:Cesium.Color.WHITE,
                outlineWidth:2
            },

            label:{
                text:item.type === 'pothole'
                    ? `P-${potholeCount}`
                    : `C-${crackCount}`,
                font:'14px sans-serif',
                fillColor:Cesium.Color.WHITE,
                verticalOrigin:Cesium.VerticalOrigin.BOTTOM,
                pixelOffset:new Cesium.Cartesian2(0,-20)
            },

            description:`
                <b>ID:</b> ${item.id}<br>
                <b>Type:</b> ${item.type}<br>
                <b>Latitude:</b> ${item.lat}<br>
                <b>Longitude:</b> ${item.lng}<br>
                <b>Depth:</b> ${item.depth_m}m<br>
                <b>Confidence:</b> ${item.confidence}
            `
        });
    });

    document.getElementById('cesiumDetectedCount').innerText = data.length;
    document.getElementById('cesiumPotholeCount').innerText = potholeCount;
    document.getElementById('cesiumCrackCount').innerText = crackCount;

    console.log('result.json 로드 성공:', data);
})
.catch(error=>{
    console.error('JSON 로드 실패:', error);
    alert('result.json 파일을 읽어오지 못했습니다. HTML 파일과 result.json 파일이 같은 폴더에 있는지 확인하세요.');
});
</script>
</body>
</html>
