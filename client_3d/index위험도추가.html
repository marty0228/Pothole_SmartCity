<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>세종대 스마트시티 - 리얼 3D 뎁스 관제 시뮬레이션</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background-color: #d8aa8c; font-family: 'Segoe UI', Tahoma, sans-serif; }
        
        /* 로딩 UI */
        #loading {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            color: #fff; background: rgba(0,0,0,0.85); padding: 30px 50px; 
            border-radius: 12px; font-size: 20px; font-weight: bold; z-index: 20;
            border: 2px solid #00ffcc; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        
        /* 미니맵 레이더 */
        #minimap-container {
            position: absolute; top: 20px; right: 20px; width: 250px; height: 250px;
            background: rgba(15, 20, 25, 0.9); border: 2px solid #00ffcc; border-radius: 12px; 
            z-index: 10; overflow: hidden; box-shadow: 0 8px 20px rgba(0,0,0,0.6);
        }
        #minimap { width: 100%; height: 100%; }
        .minimap-title { position: absolute; top: 8px; left: 12px; color: #00ffcc; font-size: 11px; font-weight: bold; letter-spacing: 1px;}
        
        /* 좌측 하단 UI */
        #ui-panel {
            position: absolute; bottom: 30px; left: 30px; color: #eee;
            background: rgba(10, 15, 20, 0.9); padding: 25px; border-radius: 12px; z-index: 10;
            border-left: 4px solid #00ffcc; box-shadow: 0 8px 20px rgba(0,0,0,0.6);
        }
        .key-btn { display: inline-block; background: #222; padding: 8px 14px; border-radius: 6px; margin: 4px; font-weight: bold; border: 1px solid #444; color: #fff; }
        
        /* 중앙 타겟팅 조준점 */
        #reticle { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 80px; height: 80px; z-index: 10; pointer-events: none; }
        .reticle-corner { position: absolute; width: 20px; height: 20px; border: 3px solid #00ffcc; }
        .tl { top: 0; left: 0; border-right: none; border-bottom: none; }
        .tr { top: 0; right: 0; border-left: none; border-bottom: none; }
        .bl { bottom: 0; left: 0; border-right: none; border-top: none; }
        .br { bottom: 0; right: 0; border-left: none; border-top: none; }
        .dot { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 8px; height: 8px; background-color: #ff0033; border-radius: 50%; box-shadow: 0 0 12px #ff0033; }
        
        /* 킥보드 핸들 */
        #scooter-handle {
            position: absolute; bottom: -30px; left: 50%; transform: translateX(-50%); width: 400px; height: 180px; z-index: 5; pointer-events: none;
            background: linear-gradient(to bottom, #111 25%, transparent 25%), linear-gradient(to right, transparent 46%, #1a1a1a 46%, #1a1a1a 54%, transparent 54%);
            background-size: 100% 25px, 100% 100%; background-repeat: no-repeat;
            filter: drop-shadow(0 -10px 15px rgba(0,0,0,0.5));
        }

        /* 실시간 경고 알림창 UI */
        #alert-box {
            position: absolute;
            top: 50px;
            left: 50%;
            transform: translateX(-50%);
            padding: 15px 40px;
            border-radius: 8px;
            font-size: 22px;
            font-weight: bold;
            color: white;
            text-align: center;
            z-index: 50;
            display: none;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
            animation: blink 0.5s infinite alternate;
        }
        @keyframes blink {
            from { opacity: 1; }
            to { opacity: 0.7; }
        }
        .alert-pothole { background-color: #ff3300; border: 3px solid #ffcc00; }
        .alert-crack { background-color: #ff9900; border: 3px solid #ff0000; }

        /* 포트홀 위험도 표시 패널 */
        #risk-panel {
            position: absolute;
            top: 285px;
            right: 20px;
            width: 250px;
            background: rgba(10, 15, 20, 0.9);
            color: #eee;
            border: 2px solid #00ffcc;
            border-radius: 12px;
            padding: 14px;
            z-index: 10;
            box-shadow: 0 8px 20px rgba(0,0,0,0.6);
            font-size: 13px;
            line-height: 1.5;
        }
        #risk-panel h4 {
            margin: 0 0 8px 0;
            color: #00ffcc;
            font-size: 13px;
            letter-spacing: 0.5px;
        }
        .risk-low { color: #66ff99; font-weight: bold; }
        .risk-medium { color: #ffcc00; font-weight: bold; }
        .risk-high { color: #ff3333; font-weight: bold; }


    </style>
</head>
<body>

    <div id="loading">📡 세종대 캠퍼스 로드 중...<br><span style="font-size:14px; color:#aaa; font-weight:normal;">도로와 건물, 파손 구역을 생성하고 있습니다.</span></div>
    
    <div id="alert-box"></div>

    <div id="minimap-container">
        <div class="minimap-title">SEJONG CAMPUS RADAR</div>
        <canvas id="minimap" width="250" height="250"></canvas>
    </div>

    <div id="risk-panel">
        <h4>AI POTHOLE RISK</h4>
        <div>가장 가까운 포트홀: <span id="risk-distance">-</span> m</div>
        <div>위험 점수: <span id="risk-score">0.0</span> / 100</div>
        <div>위험 등급: <span id="risk-level" class="risk-low">LOW</span></div>
    </div>

    <div id="ui-panel">
        <h3 style="margin: 0 0 15px 0; color: #00ffcc; font-size: 16px;">진동 킥보드 관제 모드</h3>
        <p style="margin: 5px 0; font-size: 14px;"><span class="key-btn">W</span> 전진 가속</p>
        <p style="margin: 5px 0; font-size: 14px;"><span class="key-btn">A</span> <span class="key-btn">D</span> 좌우 핸들</p>
        <p style="margin: 5px 0; font-size: 14px;"><span class="key-btn">S</span> 브레이크 및 후진</p>
    </div>
    
    <div id="reticle">
        <div class="reticle-corner tl"></div><div class="reticle-corner tr"></div>
        <div class="reticle-corner bl"></div><div class="reticle-corner br"></div><div class="dot"></div>
    </div>
    <div id="scooter-handle"></div>

    <script>
        // ==========================================
        // 1. 씬, 카메라, 조명
        // ==========================================
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xd8aa8c); 
        scene.fog = new THREE.FogExp2(0xd8aa8c, 0.003);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 2000);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        document.body.appendChild(renderer.domElement);

        const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
        scene.add(ambientLight);
        
        const dirLight = new THREE.DirectionalLight(0xffcba4, 1.8);
        dirLight.position.set(150, 200, -200);
        dirLight.castShadow = true;
        dirLight.shadow.mapSize.width = 2048;
        dirLight.shadow.mapSize.height = 2048;
        dirLight.shadow.camera.left = -200; dirLight.shadow.camera.right = 200;
        dirLight.shadow.camera.top = 200; dirLight.shadow.camera.bottom = -200;
        scene.add(dirLight);

        const baseGround = new THREE.Mesh(new THREE.PlaneGeometry(3000, 3000), new THREE.MeshStandardMaterial({ color: 0x3d4435, roughness: 1.0 }));
        baseGround.rotation.x = -Math.PI / 2; baseGround.position.y = -5.0; 
        baseGround.receiveShadow = true;
        scene.add(baseGround);

        // ==========================================
        // 2. 아스팔트 차선 텍스처
        // ==========================================
        function createRoadTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 1024; canvas.height = 1024;
            const ctx = canvas.getContext('2d');
            
            ctx.fillStyle = '#3a3a3a'; ctx.fillRect(0, 0, 1024, 1024); 
            for (let i = 0; i < 300000; i++) {
                ctx.fillStyle = Math.random() > 0.5 ? '#2c2c2c' : '#4a4a4a';
                ctx.fillRect(Math.random() * 1024, Math.random() * 1024, 1.5, 1.5);
            }
            
            ctx.fillStyle = '#e6b800';
            ctx.fillRect(495, 0, 10, 1024); ctx.fillRect(519, 0, 10, 1024);

            const tex = new THREE.CanvasTexture(canvas);
            tex.wrapS = THREE.RepeatWrapping; tex.wrapT = THREE.RepeatWrapping;
            return tex;
        }
        const roadMat = new THREE.MeshStandardMaterial({ map: createRoadTexture(), roughness: 0.9, metalness: 0.1 });

        // ==========================================
        // 3. 데이터 컨테이너
        // ==========================================
        const potholeData = [];
        const crackData = [];
        const buildingData = []; 
        const roadSegments = []; 
        let isCameraSet = false;

        const centerLat = 37.5502; const centerLng = 127.0731; // 세종대 중심
        function latLngToXZ(lat, lng) {
            const x = (lng - centerLng) * 88000;
            const z = -(lat - centerLat) * 111000; 
            return new THREE.Vector3(x, 0, z);
        }


        // ==========================================
        // ⭐ 포트홀 위험도 계산 로직
        // 위도/경도는 위치 추적용, 가로/세로/깊이/거리/속도는 위험도 산정용으로 사용
        // ==========================================
        function calculatePotholeRisk({ width, length, depth, distance, speed }) {
            const area = width * length;          // 포트홀 면적
            const sizeScore = area * 8;           // 가로×세로가 클수록 위험
            const depthScore = depth * 120;       // 깊이가 깊을수록 위험

            let distanceScore = 0;
            if (distance < 5) distanceScore = 40;
            else if (distance < 10) distanceScore = 30;
            else if (distance < 20) distanceScore = 15;
            else distanceScore = 5;

            const speedScore = Math.abs(speed) * 35; // 주행 속도가 빠를수록 위험

            let total = sizeScore + depthScore + distanceScore + speedScore;
            total = Math.min(100, total);

            let level = "LOW";
            if (total >= 70) level = "HIGH";
            else if (total >= 40) level = "MEDIUM";

            return {
                score: total.toFixed(1),
                level
            };
        }

        function getRiskClass(level) {
            if (level === "HIGH") return "risk-high";
            if (level === "MEDIUM") return "risk-medium";
            return "risk-low";
        }

        function getRiskText(level) {
            if (level === "HIGH") return "🚨 [고위험] 포트홀 즉시 감속!";
            if (level === "MEDIUM") return "⚠️ [중위험] 포트홀 접근 중";
            return "ℹ️ [저위험] 포트홀 감지";
        }

        // ==========================================
        // ⭐ 4. OSM 통신 및 도로/건물/파손구역 동적 생성
        // ==========================================
        async function fetchSejongRoads() {
            const bbox = "37.548,127.070,37.553,127.076";
            const query = `[out:json];(way["highway"](${bbox}););out geom;`;
            const url = `https://overpass-api.de/api/interpreter?data=${encodeURIComponent(query)}`;

            try {
                const response = await fetch(url);
                if (!response.ok) throw new Error("API 통신 지연");
                const data = await response.json();

                data.elements.forEach(element => {
                    if (element.geometry && element.geometry.length > 1) {
                        for(let i=0; i < element.geometry.length - 1; i++) {
                            const p1 = latLngToXZ(element.geometry[i].lat, element.geometry[i].lon);
                            const p2 = latLngToXZ(element.geometry[i+1].lat, element.geometry[i+1].lon);
                            const dist = p1.distanceTo(p2); 
                            if(dist < 5) continue;
                            
                            let dir = new THREE.Vector3().subVectors(p2, p1).normalize();
                            let right = new THREE.Vector3(-dir.z, 0, dir.x).normalize(); 
                            const roadWidth = 20; 

                            // 카메라와 파손 구역은 첫 번째 큰 도로에만 1회 설정
                            if (!isCameraSet && dist > 30) {
                                isCameraSet = true;
                                
                                let holePos = p1.clone().add(dir.clone().multiplyScalar(15));
                                potholeData.push({
                                    lat: element.geometry[i].lat,
                                    lng: element.geometry[i].lon,
                                    x: holePos.x,
                                    z: holePos.z,
                                    r: 2.5,
                                    width: 1.8,
                                    length: 2.0,
                                    depth: 0.9
                                });

                                let crackPos = p1.clone().add(dir.clone().multiplyScalar(35));
                                crackData.push({ x: crackPos.x, z: crackPos.z, r: 3.5 });

                                camera.position.set(p1.x, 1.8, p1.z);
                                targetPos.set(p1.x, 1.8, p1.z);
                                camera.lookAt(p2.x, 1.8, p2.z);
                            }

                            // ⭐ 도로망을 따라 대충 캠퍼스 건물들을 절차적(Random)으로 생성
                            if (dist > 20) {
                                let numBuildings = Math.floor(dist / 40); // 40m당 1개꼴로 배치
                                for(let k=1; k<=numBuildings; k++) {
                                    let t = k / (numBuildings + 1);
                                    let bCenter = p1.clone().lerp(p2, t);

                                    // 도로 왼쪽 건물
                                    if(Math.random() > 0.3) {
                                        let bw = 15 + Math.random()*25, bd = 15 + Math.random()*25, bh = 15 + Math.random()*40;
                                        let bx = bCenter.x - right.x * (roadWidth/2 + bw/2 + 5);
                                        let bz = bCenter.z - right.z * (roadWidth/2 + bd/2 + 5);
                                        let baseColor = new THREE.Color(0.5 + Math.random()*0.2, 0.5 + Math.random()*0.2, 0.5 + Math.random()*0.2);
                                        buildingData.push({ x: bx, z: bz, w: bw, h: bh, d: bd, color: baseColor.getHex() });
                                    }
                                    // 도로 오른쪽 건물
                                    if(Math.random() > 0.3) {
                                        let bw = 15 + Math.random()*25, bd = 15 + Math.random()*25, bh = 15 + Math.random()*40;
                                        let bx = bCenter.x + right.x * (roadWidth/2 + bw/2 + 5);
                                        let bz = bCenter.z + right.z * (roadWidth/2 + bd/2 + 5);
                                        let baseColor = new THREE.Color(0.5 + Math.random()*0.2, 0.5 + Math.random()*0.2, 0.5 + Math.random()*0.2);
                                        buildingData.push({ x: bx, z: bz, w: bw, h: bh, d: bd, color: baseColor.getHex() });
                                    }
                                }
                            }

                            const roadGeo = new THREE.PlaneGeometry(roadWidth, dist, 32, Math.max(8, Math.floor(dist)));
                            const roadMesh = new THREE.Mesh(roadGeo, roadMat);
                            const mid = p1.clone().lerp(p2, 0.5);
                            roadMesh.position.set(mid.x, 0.05, mid.z);
                            roadMesh.lookAt(p2.x, 0.05, p2.z);
                            roadMesh.rotateX(-Math.PI / 2);
                            roadMesh.updateMatrixWorld();

                            const positions = roadGeo.attributes.position;
                            const v = new THREE.Vector3();
                            for (let j = 0; j < positions.count; j++) {
                                v.fromBufferAttribute(positions, j);
                                roadMesh.localToWorld(v);

                                for (let p of potholeData) {
                                    let dx = v.x - p.x;
                                    let dz = v.z - p.z;
                                    let pDist = Math.sqrt(dx*dx + dz*dz);
                                    
                                    if (pDist < p.r) {
                                        let normalizedDist = pDist / p.r;
                                        let depthFalloff = Math.cos(normalizedDist * (Math.PI / 2));
                                        let jaggedness = (Math.random() * 0.1);
                                        v.y -= (p.depth * depthFalloff) + jaggedness;
                                    }
                                }
                                roadMesh.worldToLocal(v);
                                positions.setXYZ(j, v.x, v.y, v.z);
                            }
                            
                            roadGeo.computeVertexNormals();
                            roadMesh.receiveShadow = true; roadMesh.castShadow = true;
                            scene.add(roadMesh);

                            roadSegments.push({ p1: p1, p2: p2, width: roadWidth });
                        }
                    }
                });

                spawnBuildings(); 
                spawnCrackDecals(); 
                document.getElementById('loading').style.display = 'none';

            } catch (error) { 
                document.getElementById('loading').innerHTML = "📡 OSM API 통신 지연 발생<br><span style='font-size:14px; color:#ffaa00; font-weight:normal;'>무료 서버 과부하 상태입니다. 새로고침 해주세요.</span>"; 
            }
        }

        // ==========================================
        // 5. 생성된 건물 데이터를 바탕으로 3D 메쉬 생성
        // ==========================================
        function spawnBuildings() {
            buildingData.forEach(b => {
                const bGeo = new THREE.BoxGeometry(b.w, b.h, b.d);
                const bMat = new THREE.MeshStandardMaterial({ color: b.color, roughness: 0.9 });
                const buildingMesh = new THREE.Mesh(bGeo, bMat);
                buildingMesh.position.set(b.x, b.h / 2, b.z);
                buildingMesh.castShadow = true; 
                buildingMesh.receiveShadow = true;
                scene.add(buildingMesh);
            });
        }

        // ==========================================
        // 6. 크랙 스티커 로직
        // ==========================================
        function spawnCrackDecals() {
            const crackGroup = new THREE.Group();
            crackData.forEach(c => {
                const canvas = document.createElement('canvas');
                canvas.width = 1024; canvas.height = 1024;
                const ctx = canvas.getContext('2d');
                ctx.strokeStyle = '#000000'; ctx.lineCap = 'round'; ctx.lineJoin = 'round';
                
                function drawCrack(x, y, angle, depth, length) {
                    if (depth === 0) return;
                    ctx.lineWidth = depth * 6.0; 
                    ctx.beginPath(); ctx.moveTo(x, y);
                    const nx = x + Math.cos(angle) * length;
                    const ny = y + Math.sin(angle) * length;
                    ctx.lineTo(nx, ny); ctx.stroke();
                    drawCrack(nx, ny, angle - 0.3 + Math.random()*0.6, depth - 1, length * (0.5+Math.random()*0.3));
                    drawCrack(nx, ny, angle + 0.3 - Math.random()*0.6, depth - 1, length * (0.5+Math.random()*0.3));
                }
                for(let i=0; i<5; i++) drawCrack(512, 512, (i/5)*Math.PI*2, 4, 150);

                const crackTex = new THREE.CanvasTexture(canvas);
                crackTex.anisotropy = renderer.capabilities.getMaxAnisotropy();
                crackTex.minFilter = THREE.LinearFilter;
                const crackMat = new THREE.MeshStandardMaterial({ map: crackTex, transparent: true, depthWrite: false, polygonOffset: true, polygonOffsetFactor: -1 });
                const crackDecal = new THREE.Mesh(new THREE.PlaneGeometry(c.r*2.5, c.r*2.5), crackMat);
                crackDecal.rotation.x = -Math.PI / 2;
                crackDecal.position.set(c.x, 0.08, c.z); 
                crackGroup.add(crackDecal);
            });
            scene.add(crackGroup);
        }

        fetchSejongRoads();

        // ==========================================
        // 7. 실시간 위치 추적 미니맵 레이더
        // ==========================================
        const minimapCanvas = document.getElementById('minimap');
        const mCtx = minimapCanvas.getContext('2d');

        function updateMinimap() {
            mCtx.clearRect(0, 0, 250, 250);
            const cx = 125; const cy = 125; const mapScale = 0.5;

            // 도로망
            mCtx.strokeStyle = '#555'; 
            mCtx.lineCap = 'round';
            roadSegments.forEach(seg => {
                mCtx.lineWidth = seg.width * mapScale;
                mCtx.beginPath();
                mCtx.moveTo(cx + (seg.p1.x - camera.position.x) * mapScale, cy + (seg.p1.z - camera.position.z) * mapScale);
                mCtx.lineTo(cx + (seg.p2.x - camera.position.x) * mapScale, cy + (seg.p2.z - camera.position.z) * mapScale);
                mCtx.stroke();
            });

            // 건물 블록 표시
            mCtx.fillStyle = 'rgba(100, 150, 255, 0.6)';
            buildingData.forEach(b => {
                let rx = cx + (b.x - b.w/2 - camera.position.x) * mapScale;
                let rz = cy + (b.z - b.d/2 - camera.position.z) * mapScale;
                mCtx.fillRect(rx, rz, b.w * mapScale, b.d * mapScale);
            });

            // 포트홀(주황), 크랙(빨강)
            mCtx.fillStyle = '#ffaa00';
            potholeData.forEach(p => {
                mCtx.beginPath(); mCtx.arc(cx + (p.x - camera.position.x) * mapScale, cy + (p.z - camera.position.z) * mapScale, p.r * mapScale, 0, Math.PI*2); mCtx.fill();
            });
            mCtx.fillStyle = '#ff3333';
            crackData.forEach(c => {
                mCtx.beginPath(); mCtx.arc(cx + (c.x - camera.position.x) * mapScale, cy + (c.z - camera.position.z) * mapScale, c.r * mapScale, 0, Math.PI*2); mCtx.fill();
            });

            // 내 위치
            const dir = new THREE.Vector3(); camera.getWorldDirection(dir);
            const angle = Math.atan2(dir.z, dir.x);
            mCtx.fillStyle = 'rgba(0, 255, 204, 0.4)';
            mCtx.beginPath(); mCtx.moveTo(cx, cy);
            mCtx.arc(cx, cy, 35, angle - 0.5, angle + 0.5);
            mCtx.closePath(); mCtx.fill();
            mCtx.fillStyle = '#00ffcc';
            mCtx.beginPath(); mCtx.arc(cx, cy, 5, 0, Math.PI * 2); mCtx.fill();
        }

        // ==========================================
        // ⭐ 8. 킥보드 주행 및 충돌 감지 로직 (A/D 방향 뒤집기 반영)
        // ==========================================
        camera.position.set(0, 1.8, 0); 
        const targetPos = new THREE.Vector3(0, 1.8, 0);
        let speed = 0; const maxSpeed = 1.5; const acceleration = 0.03; const friction = 0.94;
        const keys = { w: false, a: false, s: false, d: false };
        const alertBox = document.getElementById('alert-box');
        const riskDistanceEl = document.getElementById('risk-distance');
        const riskScoreEl = document.getElementById('risk-score');
        const riskLevelEl = document.getElementById('risk-level');

        window.addEventListener('keydown', (e) => { keys[e.key.toLowerCase()] = true; });
        window.addEventListener('keyup', (e) => { keys[e.key.toLowerCase()] = false; });

        function checkCollisions() {
            let inPothole = false;
            let inCrack = false;
            let nearestPothole = null;
            let nearestDistance = Infinity;
            let nearestRisk = { score: "0.0", level: "LOW" };

            // 포트홀과 사용자 거리 + 위험도 계산
            for (let p of potholeData) {
                const dx = camera.position.x - p.x;
                const dz = camera.position.z - p.z;
                const distance = Math.sqrt(dx * dx + dz * dz);

                if (distance < nearestDistance) {
                    nearestDistance = distance;
                    nearestPothole = p;
                    nearestRisk = calculatePotholeRisk({
                        width: p.width ?? p.r * 2,
                        length: p.length ?? p.r * 2,
                        depth: p.depth ?? 0.2,
                        distance,
                        speed
                    });
                }

                if (distance < p.r) {
                    inPothole = true;
                }
            }

            // 위험도 패널 갱신
            if (nearestPothole) {
                riskDistanceEl.innerText = nearestDistance.toFixed(1);
                riskScoreEl.innerText = nearestRisk.score;
                riskLevelEl.innerText = nearestRisk.level;
                riskLevelEl.className = getRiskClass(nearestRisk.level);
            }

            // 크랙 충돌 감지
            if (!inPothole) {
                for (let c of crackData) {
                    const dx = camera.position.x - c.x;
                    const dz = camera.position.z - c.z;
                    if (Math.sqrt(dx * dx + dz * dz) < c.r) {
                        inCrack = true;
                        break;
                    }
                }
            }

            // 포트홀 반경 안에 있거나, 20m 이내 중/고위험이면 경고 표시
            const isNearDangerousPothole =
                nearestPothole &&
                nearestDistance < 20 &&
                (nearestRisk.level === "HIGH" || nearestRisk.level === "MEDIUM");

            if (inPothole || isNearDangerousPothole) {
                alertBox.style.display = 'block';
                alertBox.className = 'alert-pothole';
                alertBox.innerHTML =
                    `${getRiskText(nearestRisk.level)}<br>` +
                    `위험도 ${nearestRisk.score} / 100 · 거리 ${nearestDistance.toFixed(1)}m`;
            } else if (inCrack) {
                alertBox.style.display = 'block';
                alertBox.className = 'alert-crack';
                alertBox.innerText = '⚠️ [주의] 크랙 구역 통과 중 ⚠️';
            } else {
                alertBox.style.display = 'none';
            }
        }

        function animate() {
            requestAnimationFrame(animate);
            if (keys.w) speed = Math.min(speed + acceleration, maxSpeed);
            else if (keys.s) speed = Math.max(speed - acceleration, -maxSpeed);
            else speed *= friction;

            // 🚨 A키와 D키의 회전 방향을 반대로 수정함!
            if (keys.a) camera.rotation.y -= 0.03; // 원래 += 였음
            if (keys.d) camera.rotation.y += 0.03; // 원래 -= 였음

            const dir = new THREE.Vector3();
            camera.getWorldDirection(dir); dir.y = 0; dir.normalize();
            
            targetPos.set(targetPos.x + dir.x * speed, 1.8, targetPos.z + dir.z * speed);
            camera.position.lerp(targetPos, 0.15); 
            
            checkCollisions(); 
            renderer.render(scene, camera);
            updateMinimap();
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
