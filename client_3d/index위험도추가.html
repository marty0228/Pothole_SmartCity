<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>세종대 스마트시티 - 리얼 3D 뎁스 관제 시뮬레이션</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background-color: #7f8993; font-family: 'Segoe UI', Tahoma, sans-serif; }
        
        /* 로딩 UI */
        #loading {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            color: #fff; background: rgba(0,0,0,0.85); padding: 30px 50px; 
            border-radius: 12px; font-size: 20px; font-weight: bold; z-index: 100;
            border: 2px solid #00ffcc; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        
        /* 미니맵 레이더 */
        #minimap-container {
            position: absolute; top: 20px; right: 20px; width: 280px; height: 280px;
            background: rgba(10, 15, 20, 0.95); border: 2px solid #00ffcc; border-radius: 12px; 
            z-index: 10; overflow: hidden; box-shadow: 0 8px 20px rgba(0,0,0,0.6);
        }
        #minimap { width: 100%; height: 100%; }
        .minimap-title { position: absolute; top: 8px; left: 12px; color: #00ffcc; font-size: 11px; font-weight: bold; letter-spacing: 1px;}
        
        /* 좌측 하단 UI */
        #ui-panel {
            position: absolute; bottom: 30px; left: 30px; color: #eee;
            background: rgba(10, 15, 20, 0.9); padding: 25px; border-radius: 12px; z-index: 10;
            border-left: 4px solid #00ffcc; box-shadow: 0 8px 20px rgba(0,0,0,0.6);
        }
        .key-btn { display: inline-block; background: #222; padding: 8px 14px; border-radius: 6px; margin: 4px; font-weight: bold; border: 1px solid #444; color: #fff; }
        
        /* 중앙 타겟팅 조준점 */
        #reticle { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 80px; height: 80px; z-index: 10; pointer-events: none; }
        .reticle-corner { position: absolute; width: 20px; height: 20px; border: 3px solid #00ffcc; }
        .tl { top: 0; left: 0; border-right: none; border-bottom: none; }
        .tr { top: 0; right: 0; border-left: none; border-bottom: none; }
        .bl { bottom: 0; left: 0; border-right: none; border-top: none; }
        .br { bottom: 0; right: 0; border-left: none; border-top: none; }
        .dot { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 8px; height: 8px; background-color: #ff0033; border-radius: 50%; box-shadow: 0 0 12px #ff0033; }
        
        /* 킥보드 핸들 */
        #scooter-handle {
            position: absolute; bottom: -30px; left: 50%; transform: translateX(-50%); width: 400px; height: 180px; z-index: 5; pointer-events: none;
            background: linear-gradient(to bottom, #111 25%, transparent 25%), linear-gradient(to right, transparent 46%, #1a1a1a 46%, #1a1a1a 54%, transparent 54%);
            background-size: 100% 25px, 100% 100%; background-repeat: no-repeat;
            filter: drop-shadow(0 -10px 15px rgba(0,0,0,0.5));
        }

        /* 실시간 경고 알림창 UI */
        #alert-box {
            position: absolute; top: 50px; left: 50%; transform: translateX(-50%);
            padding: 15px 40px; border-radius: 8px; font-size: 22px; font-weight: bold;
            color: white; text-align: center; z-index: 50; display: none;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5); animation: blink 0.5s infinite alternate;
        }
        @keyframes blink { from { opacity: 1; } to { opacity: 0.7; } }
        .alert-pothole { background-color: #ff3300; border: 3px solid #ffcc00; }
        .alert-crack { background-color: #ff9900; border: 3px solid #ff0000; }

        /* 포트홀 위험도 표시 패널 */
        #risk-panel {
            position: absolute; top: 330px; right: 20px; width: 250px;
            background: rgba(10, 15, 20, 0.9); color: #eee; border: 2px solid #00ffcc;
            border-radius: 12px; padding: 14px; z-index: 10; box-shadow: 0 8px 20px rgba(0,0,0,0.6);
            font-size: 13px; line-height: 1.5;
        }
        #risk-panel h4 { margin: 0 0 8px 0; color: #00ffcc; font-size: 13px; letter-spacing: 0.5px; }
        .risk-low { color: #66ff99; font-weight: bold; }
        .risk-medium { color: #ffcc00; font-weight: bold; }
        .risk-high { color: #ff3333; font-weight: bold; }
        .risk-type-pothole { color: #ff9955; font-weight: bold; }
        .risk-type-crack { color: #ff5b5b; font-weight: bold; }
        .risk-type-none { color: #9aa7b8; font-weight: bold; }

        .landmark-title { margin-top: 14px; color: #00ffcc; font-size: 13px; font-weight: bold; }
        .landmark-list { margin-top: 8px; padding-left: 18px; color: #dcecff; font-size: 12px; line-height: 1.45; max-height: 150px; overflow-y: auto; }
    </style>
</head>
<body>

    <div id="loading">📡 세종대 캠퍼스 로드 중...<br><span style="font-size:14px; color:#aaa; font-weight:normal;">실제 위경도 지도 좌표 기반 데이터 동기화를 진행하고 있습니다.</span></div>
    
    <div id="alert-box"></div>

    <div id="minimap-container">
        <div class="minimap-title">SEJONG CAMPUS RADAR</div>
        <canvas id="minimap" width="280" height="280"></canvas>
    </div>

    <div id="risk-panel">
        <h4>AI POTHOLE RISK</h4>
        <div>가장 가까운 위험체: <span id="risk-distance">-</span> m</div>
        <div>위험 유형: <span id="risk-type" class="risk-type-none">NONE</span></div>
        <div>위험 점수: <span id="risk-score">0.0</span> / 100</div>
        <div>위험 등급: <span id="risk-level" class="risk-low">LOW</span></div>
    </div>

    <div id="ui-panel">
        <h3 style="margin: 0 0 15px 0; color: #00ffcc; font-size: 16px;">진동 킥보드 관제 모드</h3>
        <p style="margin: 5px 0; font-size: 14px;"><span class="key-btn">W</span> 전진 가속</p>
        <p style="margin: 5px 0; font-size: 14px;"><span class="key-btn">A</span> <span class="key-btn">D</span> 좌우 핸들</p>
        <p style="margin: 5px 0; font-size: 14px;"><span class="key-btn">S</span> 브레이크 및 후진</p>
        <div class="landmark-title">세종대 주요 건물</div>
        <ul class="landmark-list" id="landmark-list"></ul>
    </div>
    
    <div id="reticle">
        <div class="reticle-corner tl"></div><div class="reticle-corner tr"></div>
        <div class="reticle-corner bl"></div><div class="reticle-corner br"></div><div class="dot"></div>
    </div>
    <div id="scooter-handle"></div>

    <script>
        // ==========================================
        // 1. 기본 환경 셋업
        // ==========================================
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x7f8993); 
        scene.fog = new THREE.FogExp2(0x7f8993, 0.003);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 2000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = false;
        document.body.appendChild(renderer.domElement);

        const ambientLight = new THREE.AmbientLight(0xdde5ee, 0.7);
        scene.add(ambientLight);
        
        const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
        dirLight.position.set(150, 200, -200);
        scene.add(dirLight);

        const baseGround = new THREE.Mesh(
            new THREE.PlaneGeometry(3000, 3000), 
            new THREE.MeshStandardMaterial({ color: 0x465048, roughness: 1.0 })
        );
        baseGround.rotation.x = -Math.PI / 2; baseGround.position.y = -5.0; 
        scene.add(baseGround);

        // ==========================================
        // 2. 도로 텍스처 엔진
        // ==========================================
        function createRoadTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 1024; canvas.height = 1024;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#3a3a3a'; ctx.fillRect(0, 0, 1024, 1024); 
            for (let i = 0; i < 300000; i++) {
                ctx.fillStyle = Math.random() > 0.5 ? '#2c2c2c' : '#4a4a4a';
                ctx.fillRect(Math.random() * 1024, Math.random() * 1024, 1.5, 1.5);
            }
            ctx.fillStyle = '#e6b800';
            ctx.fillRect(495, 0, 10, 1024); ctx.fillRect(519, 0, 10, 1024);

            const tex = new THREE.CanvasTexture(canvas);
            tex.wrapS = THREE.RepeatWrapping; tex.wrapT = THREE.RepeatWrapping;
            return tex;
        }
        const roadMat = new THREE.MeshStandardMaterial({ map: createRoadTexture(), roughness: 0.9, metalness: 0.1 });

        // ==========================================
        // 3. 데이터 컨테이너 및 투영 가속 엔진
        // ==========================================
        const potholeData = [];
        const crackData = [];
        const buildingData = []; 
        const roadSegments = []; 
        
        const roadGroup = new THREE.Group();
        const assetGroup = new THREE.Group();
        const hazardGroup = new THREE.Group();
        scene.add(roadGroup);
        scene.add(assetGroup);
        scene.add(hazardGroup);

        const hazardMarkers = new Map();
        const landmarkPlacements = new Map();
        const RESULT_JSON_URL = './result.json';
        
        // 🚨 기준 오리진 좌표계 정밀화: 어린이대공원역 6번출구-정문 인근 실제 GPS 위경도로 동기화
        const centerLat = 37.549288; const centerLng = 127.074169; 

        function latLngToXZ(lat, lng) {
            const x = (lng - centerLng) * 88000;
            const z = -(lat - centerLat) * 111000; 
            return new THREE.Vector3(x, 0, z);
        }

        // 구글/네이버 지도 실제 API 경위도 데이터 기반 랜드마크 데이터셋 재구축
        const campusLandmarks = [
            { name: '대양홀', lat: 37.549288, lng: 127.074169, w: 35, d: 25, h: 34 },
            { name: '집현관', lat: 37.550240, lng: 127.073420, w: 34, d: 24, h: 38 },
            { name: '군자관', lat: 37.550980, lng: 127.073980, w: 30, d: 22, h: 34 },
            { name: '대양 AI 센터', lat: 37.549920, lng: 127.073760, w: 32, d: 22, h: 42 },
            { name: '운동장', lat: 37.550030, lng: 127.073230, w: 60, d: 45, h: 2 },
            { name: '학생회관', lat: 37.549319, lng: 127.073865, w: 32, d: 24, h: 30 },
            { name: '광개토관', lat: 37.551302, lng: 127.075108, w: 36, d: 26, h: 52 },
            { name: '애지헌', lat: 37.550480, lng: 127.074360, w: 22, d: 18, h: 24 },
            { name: '진관홀', lat: 37.551574, lng: 127.074732, w: 24, d: 18, h: 28 },
            { name: '율곡관', lat: 37.551437, lng: 127.074117, w: 24, d: 18, h: 30 },
            { name: '세종관', lat: 37.550620, lng: 127.073420, w: 28, d: 20, h: 34 },
            { name: '충무관', lat: 37.551792, lng: 127.073178, w: 28, d: 20, h: 32 },
            { name: '박물관', lat: 37.548772, lng: 127.073839, w: 26, d: 18, h: 26 },
            { name: '우정당', lat: 37.548780, lng: 127.073430, w: 24, d: 18, h: 28 },
            { name: '다산관', lat: 37.548588, lng: 127.073352, w: 26, d: 20, h: 34 },
            { name: '영실관', lat: 37.551909, lng: 127.073146, w: 28, d: 22, h: 32 },
            { name: '세종초등학교', lat: 37.552176, lng: 127.073453, w: 38, d: 25, h: 24 },
            { name: '무방관', lat: 37.552178, lng: 127.072845, w: 26, d: 18, h: 24 },
            { name: '새날관', lat: 37.552663, lng: 127.073476, w: 26, d: 20, h: 28 }
        ];

        const campusLandmarkOffsets = {
            '대양홀': { x: 8, z: 12 },
            '집현관': { x: 12, z: 8 },
            '군자관': { x: -8, z: 10 },
            '대양 AI 센터': { x: 2, z: 0 },
            '운동장': { x: 0, z: -8 },
            '학생회관': { x: -10, z: 6 },
            '광개토관': { x: 14, z: 10 },
            '애지헌': { x: 10, z: 4 },
            '진관홀': { x: 0, z: 0 },
            '율곡관': { x: 0, z: 2 },
            '세종관': { x: 18, z: 6 },
            '충무관': { x: -6, z: -8 },
            '박물관': { x: -8, z: 10 },
            '우정당': { x: 0, z: 10 },
            '다산관': { x: -12, z: 14 },
            '영실관': { x: -4, z: -8 },
            '세종초등학교': { x: 0, z: -6 },
            '무방관': { x: 6, z: -6 },
            '새날관': { x: 10, z: -4 }
        };

        // 실제 도로망 GPS 로그 데이터 기반 도로 노드 네트워크 교정
        const campusRoadPaths = [
            { width: 14, points: [{ lat: 37.549288, lng: 127.074169 }, { lat: 37.550240, lng: 127.073420 }, { lat: 37.550980, lng: 127.073980 }, { lat: 37.551437, lng: 127.074117 }, { lat: 37.551909, lng: 127.073146 }, { lat: 37.552176, lng: 127.073453 }]},
            { width: 11, points: [{ lat: 37.548772, lng: 127.073839 }, { lat: 37.549920, lng: 127.073760 }, { lat: 37.550480, lng: 127.074360 }, { lat: 37.551302, lng: 127.075108 }, { lat: 37.552663, lng: 127.073476 }]},
            { width: 10, points: [{ lat: 37.550030, lng: 127.073230 }, { lat: 37.550620, lng: 127.073420 }, { lat: 37.551792, lng: 127.073178 }, { lat: 37.552178, lng: 127.072845 }]}
        ];

        function makeLabelSprite(text) {
            const canvas = document.createElement('canvas');
            canvas.width = 512; canvas.height = 128;
            const ctx = canvas.getContext('2d');
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = 'rgba(20, 25, 35, 0.75)'; ctx.fillRect(0, 20, canvas.width, 88);
            ctx.strokeStyle = 'rgba(0, 255, 204, 0.8)'; ctx.lineWidth = 3; ctx.strokeRect(4, 24, canvas.width - 8, 80);
            ctx.fillStyle = '#ffffff'; ctx.font = 'bold 30px sans-serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
            ctx.fillText(text, canvas.width / 2, canvas.height / 2 + 4);

            const texture = new THREE.CanvasTexture(canvas);
            const material = new THREE.SpriteMaterial({ map: texture, transparent: true });
            const sprite = new THREE.Sprite(material);
            sprite.scale.set(22, 5.5, 1);
            return sprite;
        }

        function addRoadStrip(startLatLng, endLatLng, width) {
            // 실제 위경도 좌표를 3D 공간 벡터로 정밀 파싱 투영
            const start = latLngToXZ(startLatLng.lat, startLatLng.lng);
            const end = latLngToXZ(endLatLng.lat, endLatLng.lng);
            const dist = start.distanceTo(end);
            if (dist < 1) return;

            const roadGeo = new THREE.PlaneGeometry(width, dist, 48, Math.max(12, Math.floor(dist)));
            const roadMesh = new THREE.Mesh(roadGeo, roadMat);
            const mid = start.clone().lerp(end, 0.5);

            roadMesh.position.set(mid.x, 0.05, mid.z);
            roadMesh.lookAt(end.x, 0.05, end.z);
            roadMesh.rotateX(-Math.PI / 2);
            roadMesh.updateMatrixWorld();

            const positions = roadGeo.attributes.position;
            const v = new THREE.Vector3();

            for (let j = 0; j < positions.count; j++) {
                v.fromBufferAttribute(positions, j);
                roadMesh.localToWorld(v);

                for (let p of potholeData) {
                    const dx = v.x - p.x; const dz = v.z - p.z;
                    const pDist = Math.sqrt(dx * dx + dz * dz);
                    if (pDist < p.r) {
                        const normalizedDist = pDist / p.r;
                        const depthFalloff = Math.cos(normalizedDist * (Math.PI / 2));
                        v.y -= (p.depth * 7.0 * depthFalloff) + (Math.random() * 0.02);
                    }
                }
                roadMesh.worldToLocal(v);
                positions.setXYZ(j, v.x, v.y, v.z);
            }

            roadGeo.computeVertexNormals();
            roadGroup.add(roadMesh);
            roadSegments.push({ p1: start, p2: end, width });
        }

        // 파싱 유틸리티 함수 정의부
        function toNumber(value, fallback = 0) {
            const numberValue = Number(value);
            return Number.isFinite(numberValue) ? numberValue : fallback;
        }

        function clamp(v, min, max){
            return Math.min(max, Math.max(min, v));
        }

        function nearestPointOnSegment(point, start, end) {
            const segment = end.clone().sub(start);
            const segmentLengthSq = segment.lengthSq();

            if (segmentLengthSq === 0) {
                const fallbackVector = point.clone().sub(start);
                const fallbackDistance = fallbackVector.length();
                const fallbackNormal = fallbackDistance > 0.001 ? fallbackVector.normalize() : new THREE.Vector3(1, 0, 0);
                return { distance: fallbackDistance, projection: start.clone(), normal: fallbackNormal };
            }

            const t = clamp(point.clone().sub(start).dot(segment) / segmentLengthSq, 0, 1);
            const projection = start.clone().add(segment.multiplyScalar(t));
            const offset = point.clone().sub(projection);
            const distance = offset.length();
            const normal = distance > 0.001 ? offset.normalize() : new THREE.Vector3(-(end.z - start.z), 0, end.x - start.x).normalize();

            return { distance, projection, normal };
        }

        function resolveLandmarkPlacement(landmark) {
            const basePosition = latLngToXZ(landmark.lat, landmark.lng);
            const offset = campusLandmarkOffsets[landmark.name] || { x: 0, z: 0 };
            const adjustedPosition = basePosition.clone().add(new THREE.Vector3(offset.x, 0, offset.z));

            const halfSpan = Math.max(landmark.w, landmark.d) * 0.5;

            for (let pass = 0; pass < 3; pass++) {
                let nearestRoad = null;

                roadSegments.forEach(segment => {
                    const roadInfo = nearestPointOnSegment(adjustedPosition, segment.p1, segment.p2);
                    if (!nearestRoad || roadInfo.distance < nearestRoad.distance) {
                        nearestRoad = { ...roadInfo, width: segment.width };
                    }
                });

                if (!nearestRoad) break;

                const safeDistance = (nearestRoad.width * 0.5) + halfSpan + 10;
                if (nearestRoad.distance >= safeDistance) break;

                adjustedPosition.add(nearestRoad.normal.clone().multiplyScalar((safeDistance - nearestRoad.distance) + 4));
            }

            return { basePosition, position: adjustedPosition };
        }

        function isValidResultItem(item) {
            if (!item) return false;
            return Number.isFinite(toNumber(item.lat, NaN)) && Number.isFinite(toNumber(item.lng, NaN));
        }

        function normalizeResultItem(item, index) {
            const type = String(item.type || 'pothole').toLowerCase() === 'crack' ? 'crack' : 'pothole';
            const position = latLngToXZ(toNumber(item.lat), toNumber(item.lng));
            const width = Math.max(0.2, toNumber(item.width_m, 1.2));
            const length = Math.max(0.2, toNumber(item.length_m, 1.2));
            const depth = Math.max(0.01, toNumber(item.depth_m, 0.12));
            const radius = Math.max(1.0, Math.max(width, length) * 0.9);

            return {
                id: String(item.id || `item-${index + 1}`),
                type, lat: toNumber(item.lat), lng: toNumber(item.lng),
                x: position.x, z: position.z,
                r: radius, width, length, depth,
                confidence: clamp(toNumber(item.confidence, 0.5), 0, 1)
            };
        }

        function clearHazardScene() {
            hazardMarkers.forEach(marker => {
                hazardGroup.remove(marker);
                marker.traverse(node => {
                    if (node.geometry) node.geometry.dispose();
                    if (node.material) {
                        if (Array.isArray(node.material)) {
                            node.material.forEach(material => material.dispose());
                        } else {
                            node.material.dispose();
                        }
                    }
                    if (node.material && node.material.map) node.material.map.dispose();
                });
            });
            hazardMarkers.clear();
        }

        function createHazardMarker(item) {
            if (item.type === 'crack') {
                const crackLength = Math.max(4.0, item.length * 1.9);
                const crackWidth = Math.max(0.06, item.width * 0.9);
                const pointRadius = Math.max(0.45, item.r * 0.28);
                const marker = new THREE.Group();

                const yellowDot = new THREE.Mesh(
                    new THREE.SphereGeometry(pointRadius, 12, 12),
                    new THREE.MeshBasicMaterial({ color: 0xffe24a, transparent: true, opacity: 0.98, depthTest: false })
                );
                yellowDot.position.set(0, 0.9, 0);
                yellowDot.renderOrder = 1002;
                marker.add(yellowDot);

                const blackCrackMaterial = new THREE.MeshStandardMaterial({
                    color: 0x030303,
                    emissive: 0x000000,
                    emissiveIntensity: 0.0,
                    roughness: 1.0,
                    metalness: 0.0,
                    transparent: true,
                    opacity: 0.99,
                    depthWrite: false,
                    polygonOffset: true,
                    polygonOffsetFactor: -4
                });

                const crackSegments = [
                    { x: -crackLength * 0.30, z: -crackWidth * 0.10, length: crackLength * 0.26, width: crackWidth * 0.82, y: Math.PI / 6 },
                    { x: -crackLength * 0.12, z: -crackWidth * 0.04, length: crackLength * 0.34, width: crackWidth * 1.00, y: Math.PI / 17 },
                    { x: crackLength * 0.06, z: crackWidth * 0.02, length: crackLength * 0.28, width: crackWidth * 0.88, y: -Math.PI / 13 },
                    { x: crackLength * 0.22, z: crackWidth * 0.08, length: crackLength * 0.24, width: crackWidth * 0.70, y: Math.PI / 9 },
                    { x: crackLength * 0.02, z: -crackWidth * 0.20, length: crackLength * 0.18, width: crackWidth * 0.58, y: -Math.PI / 3.6 },
                    { x: -crackLength * 0.02, z: crackWidth * 0.24, length: crackLength * 0.16, width: crackWidth * 0.48, y: Math.PI / 2.8 }
                ];

                crackSegments.forEach(segment => {
                    const crackPiece = new THREE.Mesh(
                        new THREE.BoxGeometry(segment.length, 0.02, segment.width),
                        blackCrackMaterial
                    );
                    crackPiece.position.set(segment.x, 0.022, segment.z);
                    crackPiece.rotation.y = segment.y;
                    crackPiece.renderOrder = 1001;
                    marker.add(crackPiece);
                });

                const crackSpur = new THREE.Mesh(
                    new THREE.BoxGeometry(crackLength * 0.20, 0.016, crackWidth * 0.36),
                    blackCrackMaterial
                );
                crackSpur.position.set(crackLength * 0.28, 0.02, -crackWidth * 0.28);
                crackSpur.rotation.y = -Math.PI / 2.3;
                crackSpur.renderOrder = 1001;
                marker.add(crackSpur);

                marker.position.set(item.x, 0.012, item.z);
                marker.renderOrder = 1001;
                marker.userData.hazardId = item.id;
                return marker;
            }

            const marker = new THREE.Mesh(
                new THREE.SphereGeometry(Math.max(0.45, item.r * 0.28), 16, 16),
                new THREE.MeshStandardMaterial({
                    color: 0xff3333, emissive: 0xff3333, emissiveIntensity: 0.35, roughness: 0.35, metalness: 0.05
                })
            );
            marker.position.set(item.x, 0.9, item.z);
            marker.userData.hazardId = item.id;
            return marker;
        }

        function addHazardItem(item) {
            if (!isValidResultItem(item)) return null;

            const normalized = normalizeResultItem(item, hazardMarkers.size);
            if (hazardMarkers.has(normalized.id)) return hazardMarkers.get(normalized.id);

            const marker = createHazardMarker(normalized);
            hazardMarkers.set(normalized.id, marker);
            hazardGroup.add(marker);

            if (normalized.type === 'crack') crackData.push(normalized);
            else potholeData.push(normalized);

            return marker;
        }

        // ==========================================
        // 4. 비동기 실시간 파이프라인
        // ==========================================
        async function loadResultJson() {
            try {
                const response = await fetch(`${RESULT_JSON_URL}?t=${Date.now()}`, { cache: 'no-store' });
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                const json = await response.json();
                const list = Array.isArray(json) ? json : (Array.isArray(json.items) ? json.items : []);
                return list.filter(isValidResultItem).map(normalizeResultItem);
            } catch (error) {
                console.warn('result.json 파싱 딜레이 발생.');
                return [];
            }
        }

        function seedHazards(items) {
            potholeData.length = 0; crackData.length = 0;
            clearHazardScene();
            items.forEach(item => {
                addHazardItem(item);
            });
        }

        const WS_BASE_URL = (() => {
            if (window.location.protocol.startsWith('http')) {
                return `${window.location.protocol === 'https:' ? 'wss:' : 'ws:'}//${window.location.host}`;
            }
            return 'ws://127.0.0.1:8000';
        })();

        let viewerSocket = null;
        function connectLiveStream() {
            try {
                viewerSocket = new WebSocket(`${WS_BASE_URL}/ws/viewer`);
                viewerSocket.onmessage = (event) => {
                    try {
                        const payload = JSON.parse(event.data);
                        if (payload.event === 'detection' && payload.item) {
                            addHazardItem(payload.item);
                        }
                    } catch (e) { console.warn(e); }
                };
            } catch (e) { console.warn(e); }
        }

        async function loadPlatformData() {
            const items = await loadResultJson();
            seedHazards(items);
        }

        // 🚨 시동 락 걸기: 위경도 기반 동기화 완료 후 정렬 보장 실행
        async function initSejongSmartCity() {
            await loadPlatformData();

            campusRoadPaths.forEach(path => {
                for (let index = 0; index < path.points.length - 1; index++) {
                    addRoadStrip(path.points[index], path.points[index + 1], path.width);
                }
            });

            spawnCampusLandmarks();
            document.getElementById('loading').style.display = 'none';
        }

        function spawnCampusLandmarks() {
            const landmarkList = document.getElementById('landmark-list');
            if (landmarkList) landmarkList.innerHTML = '';

            campusLandmarks.forEach((landmark) => {
                const isField = landmark.name.includes('운동장') || landmark.name.includes('연못');
                
                // 🚨 보정 핵심부: 위경도 좌표를 기반으로 3D 월드 상에 정확히 트랜스레이션 변환 처리
                const resolved = resolveLandmarkPlacement(landmark);
                const pos = resolved.position;
                landmarkPlacements.set(landmark.name, resolved);

                const body = new THREE.Mesh(
                    new THREE.BoxGeometry(landmark.w, isField ? 0.2 : landmark.h, landmark.d),
                    new THREE.MeshStandardMaterial({ 
                        color: landmark.name.includes('운동장') ? 0x557a46 : (landmark.name.includes('연못') ? 0x4cc9f0 : 0x8fa7c5), 
                        roughness: 0.8 
                    })
                );
                body.position.set(pos.x, isField ? 0.1 : landmark.h / 2, pos.z);
                scene.add(body);

                const label = makeLabelSprite(landmark.name);
                label.position.set(pos.x, isField ? 6 : landmark.h + 6, pos.z);
                scene.add(label);

                if (landmarkList) {
                    const li = document.createElement('li');
                    li.textContent = landmark.name;
                    landmarkList.appendChild(li);
                }
            });
        }

        // ==========================================
        // 5. 물리 충돌 및 위험도 스코어 모듈
        // ==========================================
        function calculatePotholeRisk({ width, length, depth, distance, speed }) {
            const total = Math.min(100, (width * length) * 8 + depth * 120 + (distance < 5 ? 40 : (distance < 10 ? 30 : 15)) + Math.abs(speed) * 35);
            return { score: total.toFixed(1), level: total >= 70 ? "HIGH" : (total >= 40 ? "MEDIUM" : "LOW") };
        }

        function calculateCrackRisk({ radius, distance, speed }) {
            const total = Math.min(100, radius * 7 + (distance < 3 ? 35 : (distance < 8 ? 24 : 12)) + Math.abs(speed) * 20);
            return { score: total.toFixed(1), level: total >= 70 ? "HIGH" : (total >= 40 ? "MEDIUM" : "LOW") };
        }

        // ==========================================
        // 6. 주행 스레더 및 미니맵 합성 레이어 고도화
        // ==========================================
        const gatePos = latLngToXZ(centerLat, centerLng);
        camera.position.set(gatePos.x, 1.8, gatePos.z); 
        camera.lookAt(0, 1.8, 0); 
        const targetPos = new THREE.Vector3(gatePos.x, 1.8, gatePos.z);
        
        let speed = 0; const maxSpeed = 1.5; const acceleration = 0.03; const friction = 0.94;
        const keys = { w: false, a: false, s: false, d: false };

        const alertBox = document.getElementById('alert-box');
        const riskDistanceEl = document.getElementById('risk-distance');
        const riskTypeEl = document.getElementById('risk-type');
        const riskScoreEl = document.getElementById('risk-score');
        const riskLevelEl = document.getElementById('risk-level');

        window.addEventListener('keydown', (e) => { keys[e.key.toLowerCase()] = true; });
        window.addEventListener('keyup', (e) => { keys[e.key.toLowerCase()] = false; });

        function checkCollisions() {
            let inPothole = false; let inCrack = false;
            let nearestPotholeDistance = Infinity; let nearestPotholeRisk = { score: "0.0", level: "LOW" };
            let nearestCrackDistance = Infinity; let nearestCrackRisk = { score: "0.0", level: "LOW" };

            potholeData.forEach(p => {
                const distance = Math.sqrt(Math.pow(camera.position.x - p.x, 2) + Math.pow(camera.position.z - p.z, 2));
                if (distance < nearestPotholeDistance) {
                    nearestPotholeDistance = distance;
                    nearestPotholeRisk = calculatePotholeRisk({ width: p.width, length: p.length, depth: p.depth, distance, speed });
                }
                if (distance < p.r) inPothole = true;
            });

            crackData.forEach(c => {
                const distance = Math.sqrt(Math.pow(camera.position.x - c.x, 2) + Math.pow(camera.position.z - c.z, 2));
                if (distance < nearestCrackDistance) {
                    nearestCrackDistance = distance;
                    nearestCrackRisk = calculateCrackRisk({ radius: c.r, distance, speed });
                }
                if (distance < c.r) inCrack = true;
            });

            const potholeNear = nearestPotholeDistance < 20; const crackNear = nearestCrackDistance < 15;
            const dominantIsPothole = potholeNear && (!crackNear || Number(nearestPotholeRisk.score) >= Number(nearestCrackRisk.score));
            const type = dominantIsPothole ? "pothole" : (crackNear ? "crack" : null);
            const risk = dominantIsPothole ? nearestPotholeRisk : nearestCrackRisk;
            const dist = dominantIsPothole ? nearestPotholeDistance : nearestCrackDistance;

            if (type) {
                riskDistanceEl.innerText = dist.toFixed(1);
                riskTypeEl.innerText = type === 'pothole' ? 'POTHOLE' : 'CRACK';
                riskTypeEl.className = type === 'pothole' ? 'risk-type-pothole' : 'risk-type-crack';
                riskScoreEl.innerText = risk.score; riskLevelEl.innerText = risk.level;
                riskLevelEl.className = risk.level === "HIGH" ? "risk-high" : (risk.level === "MEDIUM" ? "risk-medium" : "risk-low");
            } else {
                riskDistanceEl.innerText = '-'; riskTypeEl.innerText = 'NONE'; riskTypeEl.className = 'risk-type-none';
                riskScoreEl.innerText = '0.0'; riskLevelEl.innerText = 'LOW'; riskLevelEl.className = 'risk-low';
            }

            if (inPothole || (nearestPotholeDistance < 15 && nearestPotholeRisk.level !== "LOW")) {
                alertBox.style.display = 'block'; alertBox.className = 'alert-pothole';
                alertBox.innerHTML = `🚨 [고위험] 포트홀 구간 위험 지수: ${nearestPotholeRisk.score} · 거리: ${nearestPotholeDistance.toFixed(1)}m`;
            } else if (inCrack || (nearestCrackDistance < 12 && nearestCrackRisk.level !== "LOW")) {
                alertBox.style.display = 'block'; alertBox.className = 'alert-crack';
                alertBox.innerHTML = `⚠️ [주의] 도로 균열(크랙) 발생 구역 진입`;
            } else {
                alertBox.style.display = 'none';
            }
        }

        const minimapCanvas = document.getElementById('minimap');
        const mCtx = minimapCanvas.getContext('2d');

        // ⭐ 인라인 명칭 합성 레이더 인터페이스 전면 빌드
        function updateMinimap() {
            mCtx.clearRect(0, 0, 280, 280);
            const cx = 140; const cy = 140; const mapScale = 0.95;

            roadSegments.forEach(seg => {
                mCtx.strokeStyle = '#444'; mCtx.lineCap = 'round';
                mCtx.lineWidth = seg.width * mapScale; mCtx.beginPath();
                mCtx.moveTo(cx + (seg.p1.x - camera.position.x) * mapScale, cy + (seg.p1.z - camera.position.z) * mapScale);
                mCtx.lineTo(cx + (seg.p2.x - camera.position.x) * mapScale, cy + (seg.p2.z - camera.position.z) * mapScale);
                mCtx.stroke();
            });

            campusLandmarks.forEach(b => {
                // 실시간 위경도 투영 좌표 추적
                const placement = landmarkPlacements.get(b.name) || resolveLandmarkPlacement(b);
                const pos = placement.position;
                let rx = cx + (pos.x - b.w/2 - camera.position.x) * mapScale;
                let rz = cy + (pos.z - b.d/2 - camera.position.z) * mapScale;
                
                mCtx.fillStyle = b.name.includes('운동장') ? 'rgba(85, 122, 70, 0.75)' : (b.name.includes('연못') ? 'rgba(76, 201, 240, 0.6)' : 'rgba(100, 145, 215, 0.7)'); 
                mCtx.fillRect(rx, rz, b.w * mapScale, b.d * mapScale);

                mCtx.fillStyle = '#ffffff'; mCtx.font = 'bold 9px sans-serif'; mCtx.textAlign = 'center'; mCtx.textBaseline = 'middle';
                mCtx.fillText(b.name.split(' ')[0], rx + (b.w * mapScale) / 2, rz + (b.d * mapScale) / 2);
            });

            mCtx.fillStyle = '#ffaa00';
            potholeData.forEach(p => {
                mCtx.beginPath(); mCtx.arc(cx + (p.x - camera.position.x) * mapScale, cy + (p.z - camera.position.z) * mapScale, p.r * mapScale, 0, Math.PI*2); mCtx.fill();
            });

            mCtx.fillStyle = '#ff3333';
            crackData.forEach(c => {
                mCtx.beginPath(); mCtx.arc(cx + (c.x - camera.position.x) * mapScale, cy + (c.z - camera.position.z) * mapScale, c.r * mapScale, 0, Math.PI*2); mCtx.fill();
            });

            const dir = new THREE.Vector3(); camera.getWorldDirection(dir);
            const angle = Math.atan2(dir.z, dir.x);
            mCtx.fillStyle = 'rgba(0, 255, 204, 0.35)'; mCtx.beginPath(); mCtx.moveTo(cx, cy); mCtx.arc(cx, cy, 35, angle - 0.5, angle + 0.5); mCtx.fill();
            mCtx.fillStyle = '#00ffcc'; mCtx.beginPath(); mCtx.arc(cx, cy, 5, 0, Math.PI * 2); mCtx.fill();
        }

        function animate() {
            requestAnimationFrame(animate);
            if (keys.w) speed = Math.min(speed + acceleration, maxSpeed);
            else if (keys.s) speed = Math.max(speed - acceleration, -maxSpeed);
            else speed *= friction;

            if (keys.a) camera.rotation.y += 0.025;
            if (keys.d) camera.rotation.y -= 0.025;

            const dir = new THREE.Vector3(); camera.getWorldDirection(dir); dir.y = 0; dir.normalize();
            targetPos.set(targetPos.x + dir.x * speed, 1.8, targetPos.z + dir.z * speed);
            camera.position.lerp(targetPos, 0.15); 

            checkCollisions();
            renderer.render(scene, camera);
            updateMinimap();
        }

        initSejongSmartCity().then(connectLiveStream);
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
