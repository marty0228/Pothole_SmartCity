<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>세종대 3D 관제 - 리얼 3D 입체 파손(포트홀/크랙)</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background-color: #dab49d; font-family: 'Segoe UI', Tahoma, sans-serif; }
        #loading {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            color: #fff; background: rgba(0,0,0,0.85); padding: 25px 45px; 
            border-radius: 8px; font-size: 18px; font-weight: bold; z-index: 20;
            border: 2px solid #00ffcc; text-align: center;
        }
        #ui-panel {
            position: absolute; bottom: 30px; left: 30px; color: #eee;
            background: rgba(15, 15, 15, 0.9); padding: 20px; border-radius: 12px; z-index: 10; border-left: 4px solid #00ffcc;
        }
        .key-btn { display: inline-block; background: #333; padding: 6px 12px; border-radius: 6px; margin: 4px; font-weight: bold; border: 1px solid #555; color: #fff; }
        #reticle { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 80px; height: 80px; z-index: 10; pointer-events: none; }
        .reticle-corner { position: absolute; width: 20px; height: 20px; border: 3px solid #00ffcc; }
        .tl { top: 0; left: 0; border-right: none; border-bottom: none; }
        .tr { top: 0; right: 0; border-left: none; border-bottom: none; }
        .bl { bottom: 0; left: 0; border-right: none; border-top: none; }
        .br { bottom: 0; right: 0; border-left: none; border-top: none; }
        .dot { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 8px; height: 8px; background-color: red; border-radius: 50%; box-shadow: 0 0 10px red; }
        #scooter-handle {
            position: absolute; bottom: -20px; left: 50%; transform: translateX(-50%); width: 350px; height: 160px; z-index: 5; pointer-events: none;
            background: linear-gradient(to bottom, #111 25%, transparent 25%), linear-gradient(to right, transparent 46%, #222 46%, #222 54%, transparent 54%);
            background-size: 100% 20px, 100% 100%; background-repeat: no-repeat;
        }
        #minimap-container {
            position: absolute; top: 20px; right: 20px; width: 250px; height: 250px;
            background: rgba(10, 15, 20, 0.8); border: 2px solid #00ffcc; border-radius: 10px; z-index: 10; overflow: hidden; box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }
        #minimap { width: 100%; height: 100%; }
        .minimap-title { position: absolute; top: 5px; left: 10px; color: #00ffcc; font-size: 12px; font-weight: bold; }
    </style>
</head>
<body>

    <div id="loading">📡 리얼 3D 뎁스 렌더링 중...</div>
    
    <div id="minimap-container">
        <div class="minimap-title">🗺️ SEJONG UNIV. RADAR</div>
        <canvas id="minimap" width="250" height="250"></canvas>
    </div>

    <div id="ui-panel">
        <h3 style="margin: 0 0 15px 0; color: #00ffcc; font-size: 16px;">관제 시뮬레이션 모드</h3>
        <p style="margin: 5px 0; font-size: 14px;"><span class="key-btn">W</span> 전진 가속</p>
        <p style="margin: 5px 0; font-size: 14px;"><span class="key-btn">A</span> <span class="key-btn">D</span> 방향 조향</p>
        <p style="margin: 5px 0; font-size: 14px;"><span class="key-btn">S</span> 브레이크</p>
    </div>
    
    <div id="reticle">
        <div class="reticle-corner tl"></div><div class="reticle-corner tr"></div>
        <div class="reticle-corner bl"></div><div class="reticle-corner br"></div><div class="dot"></div>
    </div>
    <div id="scooter-handle"></div>

    <script>
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xdab49d);
        scene.fog = new THREE.FogExp2(0xdab49d, 0.003);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 2000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        // 그림자 퀄리티 극대화 (포트홀 입체감을 위해)
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        document.body.appendChild(renderer.domElement);

        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);
        
        const dirLight = new THREE.DirectionalLight(0xffeedd, 1.5);
        dirLight.position.set(100, 200, -100);
        dirLight.castShadow = true;
        dirLight.shadow.mapSize.width = 2048;
        dirLight.shadow.mapSize.height = 2048;
        dirLight.shadow.camera.near = 0.5;
        dirLight.shadow.camera.far = 1000;
        // 그림자 영역을 좁혀서 해상도를 극대화
        dirLight.shadow.camera.left = -100; dirLight.shadow.camera.right = 100;
        dirLight.shadow.camera.top = 100; dirLight.shadow.camera.bottom = -100;
        scene.add(dirLight);

        // 밝은 아스팔트 (파손 객체와의 명도 대비를 위해)
        function createAsphaltTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 512; canvas.height = 512;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#888888'; ctx.fillRect(0, 0, 512, 512); 
            for (let i = 0; i < 200000; i++) {
                ctx.fillStyle = Math.random() > 0.5 ? '#777777' : '#999999';
                ctx.fillRect(Math.random() * 512, Math.random() * 512, 1.5, 1.5);
            }
            const tex = new THREE.CanvasTexture(canvas);
            tex.wrapS = THREE.RepeatWrapping; tex.wrapT = THREE.RepeatWrapping;
            return tex;
        }

        const roadMat = new THREE.MeshStandardMaterial({ map: createAsphaltTexture(), color: 0xcccccc, roughness: 1.0 });

        // ==========================================
        // ⭐ 1. 진짜 입체 포트홀 (Geometric Crater)
        // ==========================================
        function createDeepPothole(size = 3.0) {
            const group = new THREE.Group();

            // 1. 심연(Abyss): 빛을 받지 않는 완벽한 칠흑의 바닥
            const abyssGeo = new THREE.CircleGeometry(size * 0.45, 32);
            // MeshBasicMaterial은 조명에 반응하지 않아 완벽한 구멍처럼 보입니다.
            const abyssMat = new THREE.MeshBasicMaterial({ color: 0x050505, depthWrite: false }); 
            const abyss = new THREE.Mesh(abyssGeo, abyssMat);
            abyss.rotation.x = -Math.PI / 2;
            abyss.position.y = 0.01; // 도로(0.0)보다 아주 살짝 위
            group.add(abyss);

            // 2. 분화구 림(Rim): 실제 3D 돌멩이들로 테두리를 쌓아 올려 깊이감을 형성
            const rimMat = new THREE.MeshStandardMaterial({ color: 0x555555, roughness: 1.0 });
            const darkMat = new THREE.MeshStandardMaterial({ color: 0x222222, roughness: 1.0 });

            const count = 50;
            for(let i=0; i<count; i++) {
                const angle = (i / count) * Math.PI * 2 + (Math.random() * 0.2);
                const r = size * 0.45 + Math.random() * 0.1;
                const rockSize = size * 0.15 * (0.5 + Math.random());
                const rock = new THREE.Mesh(new THREE.DodecahedronGeometry(rockSize), rimMat);
                // 가장자리 돌들은 도로 위로 튀어나와 안쪽 심연으로 그림자를 드리움
                rock.position.set(Math.cos(angle) * r, 0.01 + rockSize/2.5, Math.sin(angle) * r);
                rock.rotation.set(Math.random(), Math.random(), Math.random());
                rock.castShadow = true; rock.receiveShadow = true;
                group.add(rock);
            }

            // 3. 구멍 내부의 부서진 잔해들 (더 어두운 색상)
            for(let i=0; i<25; i++) {
                const angle = Math.random() * Math.PI * 2;
                const r = Math.random() * size * 0.4;
                const rockSize = size * 0.08 * (0.5 + Math.random());
                const rock = new THREE.Mesh(new THREE.DodecahedronGeometry(rockSize), darkMat);
                rock.position.set(Math.cos(angle) * r, 0.015 + rockSize/2, Math.sin(angle) * r);
                rock.rotation.set(Math.random(), Math.random(), Math.random());
                rock.castShadow = true;
                group.add(rock);
            }

            return group;
        }

        // ==========================================
        // ⭐ 2. 묻히지 않는 초고대비 크랙 (Alpha Map 적용)
        // ==========================================
        function create3DCrack(size = 5.0) {
            const canvas = document.createElement('canvas');
            canvas.width = 1024; canvas.height = 1024; // 고해상도
            const ctx = canvas.getContext('2d');
            
            // 검은색 배경 (투명하게 처리될 부분)
            ctx.fillStyle = '#000000'; 
            ctx.fillRect(0, 0, 1024, 1024);
            
            // 하얀색 선 (실제 크랙으로 보일 부분)
            ctx.strokeStyle = '#ffffff'; 
            ctx.lineCap = 'round'; ctx.lineJoin = 'round';
            
            function drawCrack(x, y, angle, depth, length) {
                if (depth === 0) return;
                ctx.lineWidth = depth * 5; // 두껍게
                ctx.beginPath(); ctx.moveTo(x, y);
                const nx = x + Math.cos(angle) * length;
                const ny = y + Math.sin(angle) * length;
                ctx.lineTo(nx, ny); ctx.stroke();
                
                drawCrack(nx, ny, angle - 0.4 + Math.random()*0.8, depth - 1, length * (0.5 + Math.random()*0.3));
                drawCrack(nx, ny, angle + 0.4 - Math.random()*0.8, depth - 1, length * (0.5 + Math.random()*0.3));
            }
            
            // 중앙에서 5가닥 뻗어나감
            for(let i=0; i<5; i++) {
                drawCrack(512, 512, (i/5)*Math.PI*2 + Math.random(), 5, 180);
            }

            const alphaMap = new THREE.CanvasTexture(canvas);
            
            // 알파맵(AlphaMap)을 사용하여 흰색 선 부분만 시꺼먼 재질로 렌더링
            const crackMat = new THREE.MeshStandardMaterial({ 
                color: 0x0a0a0a, // 아주 진한 검은색 균열
                alphaMap: alphaMap, 
                transparent: true, 
                depthWrite: false, // 도로 밑으로 파묻히는 Z-fighting 원천 차단
                roughness: 1.0
            });
            
            const crackDecal = new THREE.Mesh(new THREE.PlaneGeometry(size, size), crackMat);
            crackDecal.rotation.x = -Math.PI / 2;
            crackDecal.position.y = 0.03; // 도로(0.0)보다 확실하게 띄움

            return crackDecal;
        }

        // ==========================================
        // 3. 세종대 도로망 렌더링
        // ==========================================
        const centerLat = 37.5502; const centerLng = 127.0731;
        function latLngToXZ(lat, lng) {
            const x = (lng - centerLng) * 88000;
            const z = -(lat - centerLat) * 111000; 
            return new THREE.Vector3(x, 0, z);
        }

        const roadSegments = []; 

        async function fetchRoadData() {
            const bbox = "37.548,127.071,37.553,127.076";
            const query = `[out:json];(way["highway"](${bbox}););out geom;`;
            const url = `https://overpass-api.de/api/interpreter?data=${encodeURIComponent(query)}`;

            try {
                const response = await fetch(url);
                const data = await response.json();

                data.elements.forEach(element => {
                    if (element.geometry && element.geometry.length > 1) {
                        for(let i=0; i < element.geometry.length - 1; i++) {
                            const p1 = latLngToXZ(element.geometry[i].lat, element.geometry[i].lon);
                            const p2 = latLngToXZ(element.geometry[i+1].lat, element.geometry[i+1].lon);
                            const dist = p1.distanceTo(p2); if(dist < 1) continue;
                            
                            const roadGeo = new THREE.PlaneGeometry(8, dist);
                            const uvs = roadGeo.attributes.uv.array;
                            for ( let j = 0; j < uvs.length; j += 2 ) {
                                uvs[ j ] *= 1; uvs[ j + 1 ] *= (dist / 8); 
                            }
                            const road = new THREE.Mesh(roadGeo, roadMat);
                            const mid = p1.clone().lerp(p2, 0.5);
                            road.position.set(mid.x, 0.0, mid.z); // 도로는 정확히 y=0
                            road.lookAt(p2.x, 0.0, p2.z); road.rotateX(-Math.PI / 2);
                            road.receiveShadow = true; scene.add(road);
                            roadSegments.push({ p1: p1, p2: p2 });
                        }
                    }
                });

                // 빌딩 생성
                const buildingMat = new THREE.MeshStandardMaterial({ color: 0x888888, roughness: 0.8 });
                for(let i=0; i<80; i++) {
                    const x = (Math.random() - 0.5) * 400; const z = (Math.random() - 0.5) * 400;
                    if(Math.abs(x) < 15) continue; 
                    const h = Math.random() * 40 + 15;
                    const b = new THREE.Mesh(new THREE.BoxGeometry(20, h, 20), buildingMat);
                    b.position.set(x, h/2, z);
                    b.castShadow = true; b.receiveShadow = true; scene.add(b);
                }

                document.getElementById('loading').style.display = 'none';

                // ⭐ 포트홀과 크랙 배치 (엄청 크게 키움)
                const pothole = createDeepPothole(3.5);
                pothole.position.set(0, 0, -12); // 앞 12m
                scene.add(pothole);

                const crack = create3DCrack(6.0);
                crack.position.set(0, 0, -25); // 앞 25m
                scene.add(crack);

            } catch (error) { document.getElementById('loading').innerText = "데이터 로딩 실패"; }
        }
        fetchRoadData();

        // 4. 미니맵
        const minimapCanvas = document.getElementById('minimap');
        const mCtx = minimapCanvas.getContext('2d');

        function updateMinimap() {
            mCtx.clearRect(0, 0, 250, 250);
            const mapScale = 0.3; const cx = 125; const cy = 125;

            mCtx.strokeStyle = '#555'; mCtx.lineWidth = 4;
            roadSegments.forEach(seg => {
                mCtx.beginPath();
                mCtx.moveTo(cx + seg.p1.x * mapScale, cy + seg.p1.z * mapScale);
                mCtx.lineTo(cx + seg.p2.x * mapScale, cy + seg.p2.z * mapScale);
                mCtx.stroke();
            });

            const px = cx + camera.position.x * mapScale;
            const py = cy + camera.position.z * mapScale;
            const dir = new THREE.Vector3();
            camera.getWorldDirection(dir);
            const angle = Math.atan2(dir.z, dir.x);
            
            mCtx.fillStyle = 'rgba(0, 255, 204, 0.3)';
            mCtx.beginPath(); mCtx.moveTo(px, py);
            mCtx.arc(px, py, 30, angle - 0.5, angle + 0.5);
            mCtx.closePath(); mCtx.fill();

            mCtx.fillStyle = '#ff0000';
            mCtx.beginPath(); mCtx.arc(px, py, 4, 0, Math.PI * 2); mCtx.fill();
        }

        // 5. 물리엔진
        camera.position.set(0, 1.8, 0); 
        const targetPos = new THREE.Vector3(0, 1.8, 0);
        let speed = 0; const maxSpeed = 1.2; const acceleration = 0.02; const friction = 0.95;
        const keys = { w: false, a: false, s: false, d: false };

        window.addEventListener('keydown', (e) => { keys[e.key.toLowerCase()] = true; });
        window.addEventListener('keyup', (e) => { keys[e.key.toLowerCase()] = false; });

        function animate() {
            requestAnimationFrame(animate);
            if (keys.w) speed = Math.min(speed + acceleration, maxSpeed);
            else if (keys.s) speed = Math.max(speed - acceleration, -maxSpeed);
            else speed *= friction;

            if (keys.a) camera.rotation.y += 0.03;
            if (keys.d) camera.rotation.y -= 0.03;

            const dir = new THREE.Vector3();
            camera.getWorldDirection(dir); dir.y = 0; dir.normalize();
            targetPos.addScaledVector(dir, speed);
            camera.position.lerp(targetPos, 0.15); 
            
            renderer.render(scene, camera);
            updateMinimap();
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
